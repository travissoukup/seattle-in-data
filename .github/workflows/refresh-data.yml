name: Weekly data refresh

on:
  schedule:
    # Mondays 14:10 UTC (7:10am Seattle in summer)
    - cron: "10 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Re-run all fetch scripts
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: node scripts/refresh-all.mjs

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "data-refresh-bot"
          git config user.email "actions@github.com"
          git add src/lib/generated public/leads.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Weekly data refresh $(date -u +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "No VERCEL_TOKEN secret set; skipping deploy (Vercel Git integration will deploy instead if connected)."
            exit 0
          fi
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel build --prod --token "$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
