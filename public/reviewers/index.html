<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SDCI Reviewer Performance Dashboard</title>
<style>:root{--bg:#f7f8fa;--panel:#ffffff;--ink:#1a1f24;--muted:#5b6670;--line:#e3e7eb;--blue:#0072B2;--orange:#D55E00;--green:#009E73;--pink:#CC79A7;--warn-bg:#fff4e0;--warn-line:#e0a23a;--warn-ink:#7a4d00;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;line-height:1.45}
#app{max-width:1180px;margin:0 auto;padding:28px 20px 80px}
h1{font-size:24px;margin:0 0 4px}
h2{font-size:18px;margin:34px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
h3{font-size:15px;margin:18px 0 8px}
.sub{color:var(--muted);margin:0 0 14px}
.banner{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn-ink);border-radius:8px;padding:12px 16px;margin:14px 0 8px;font-size:13.5px}
.banner b{color:#5a3900}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
.card .v{font-size:22px;font-weight:650;letter-spacing:-.3px}
.card .l{color:var(--muted);font-size:12px;margin-top:2px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin:12px 0}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
select,input{font:inherit;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);min-width:170px}
input[type=search]{min-width:240px}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;user-select:none}
th.sortable:hover{color:var(--ink)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#f2f6fb}
tr.clickable{cursor:pointer}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11.5px;background:#eef2f6;color:var(--muted)}
.bar{height:8px;border-radius:4px;background:var(--blue);display:inline-block;vertical-align:middle}
.barwrap{display:inline-block;width:90px;background:#eef2f6;border-radius:4px;vertical-align:middle;margin-right:6px}
.scroll{overflow:auto;max-height:560px;border:1px solid var(--line);border-radius:8px}
.scroll table th{position:sticky;top:0;background:var(--panel);z-index:1}
.muted{color:var(--muted)}
.pill{font-size:11px;padding:1px 6px;border-radius:4px}
.good{background:#e3f4ee;color:#0a7a55}
.mid{background:#fdf1e0;color:#9a5a00}
.bad{background:#fbe7e1;color:#a8331a}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.drawer-bg{position:fixed;inset:0;background:rgba(20,28,36,.45);display:none;z-index:10}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.2);transform:translateX(100%);transition:transform .18s ease;overflow:auto;z-index:11;padding:20px}
.drawer.open{transform:translateX(0)}
.drawer .x{float:right;cursor:pointer;font-size:20px;color:var(--muted);border:none;background:none}
.kv{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0}
.kv .card{padding:10px}
.foot{color:var(--muted);font-size:12px;margin-top:6px}
.tabbar{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px}
.tabbar button{font:inherit;padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:20px;cursor:pointer;color:var(--muted)}
.tabbar button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.dl{font-size:12px}
#back{position:fixed;top:10px;left:12px;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12.5px;color:var(--blue);text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#back:hover{text-decoration:underline}
@media (max-width:1439px){#app{padding-top:58px}}
section{display:none}section.active{display:block}</style>
</head>

  if (String(y)===ly){ var lm = Number(D.dataWindow.last.slice(5,7)); if (lm<12) return y+' (through '+MONTHS[lm-1]+')'; }
  if (String(y)===fy){ var fm = Number(D.dataWindow.first.slice(5,7)); if (fm>1) return y+' (from '+MONTHS[fm-1]+')'; }
  return String(y);
}

function ratePill(v, lo, hi){
  if (v==null) return h('span',{class:'muted'},'-');
  var cls = v<=lo?'good':(v<=hi?'mid':'bad');
  return h('span',{class:'pill '+cls}, pct(v));
}

// --- sparkline (median days by year) -------------------------------------
function spark(points, w, hgt){
  w=w||120;hgt=hgt||28;
  var vals = points.map(function(p){return p.v;}).filter(function(x){return x!=null;});
  if (!vals.length) return h('span',{class:'muted'},'no data');
  var max=Math.max.apply(null,vals), min=Math.min.apply(null,vals);
  var rng = max-min || 1;
  var n0 = points.length;
  var path = points.map(function(p,i){
    if (p.v==null) return null;
    var x = n0<2?0:(i/(n0-1))*(w-4)+2;
    var y = hgt-2-((p.v-min)/rng)*(hgt-6);
    return (Math.round(x*10)/10)+','+(Math.round(y*10)/10);
  }).filter(Boolean).join(' ');
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',w);svg.setAttribute('height',hgt);
  var pl=document.createElementNS(ns,'polyline');
  pl.setAttribute('points',path);pl.setAttribute('fill','none');
  pl.setAttribute('stroke','#0072B2');pl.setAttribute('stroke-width','1.5');
  svg.appendChild(pl);
  return svg;
}

// --- shell ----------------------------------------------------------------
function render(){
  app.appendChild(h('h1',null,'SDCI Reviewer Performance Dashboard'));
  app.appendChild(h('p',{class:'sub'},'Seattle Department of Construction and Inspections plan review. Source: Plan Review dataset (tqk8-y2z5), data.seattle.gov. Generated '+D.generatedAt+'.'));

  // Scope: this dataset is almost entirely residential. Numbers come from a live
  // permitclass group-by injected as D.permitClass, not typed into the copy.
  var pc = D.permitClass || [];
  if (pc.length){
    var pcv = {}; var pcTotal = 0;
    pc.forEach(function(c){ pcv[c.permitclass] = Number(c.n); pcTotal += Number(c.n); });
    var resN = (pcv['Single Family/Duplex']||0) + (pcv['Multifamily']||0);
    var resPct = Math.round(1000*resN/(pcTotal||1))/10;
    app.appendChild(h('div',{class:'banner',html:
      '<b>Residential permits only.</b> '+n(pcv['Single Family/Duplex'])+' of the '+n(pcTotal)
      +' permits here are Single Family/Duplex and '+n(pcv['Multifamily'])+' are Multifamily, '
      +resPct+'% of the set. Commercial plan review is essentially absent ('+n(pcv['Commercial'])
      +' permits). Do not read these timelines as citywide SDCI performance. Permit classes queried live '
      +esc(D.permitClassAsOf)+'.'}));
  }

  app.appendChild(h('div',{class:'banner',html:
    '<b>Read this first.</b> This dataset records <b>completed</b> reviews only. Every row has a finish date, so it cannot show which applications are <b>currently</b> assigned to a reviewer, and the most recent review in the data finished <b>'+D.dataWindow.last+'</b> (about a year before today). Use these numbers to estimate <b>how long a given reviewer, review type, and cycle usually take</b>, not to see live workload. Per-reviewer live assignment is not published in Seattle open data.'}));

  // overview cards
  var o = D.overall;
  var cards = h('div',{class:'cards'});
  [['Reviews (deduped)',n(o.n_reviews)],
   ['Reviewers',n(o.n_reviewers)],
   ['Permits',n(o.n_permits)],
   ['Median turnaround',d1(o.median_turnaround_days)+' d'],
   ['p90 turnaround',d1(o.p90_turnaround_days)+' d'],
   ['Corrections rate',pct(o.correction_rate)],
   ['Stall rate (>60d)',pct(o.stall_rate)],
   ['Data through',D.dataWindow.last]
  ].forEach(function(c){
    cards.appendChild(h('div',{class:'card'},[h('div',{class:'v'},c[1]),h('div',{class:'l'},c[0])]));
  });
  app.appendChild(cards);

  // tab nav
  var tabs = [['expect','Turnaround expectations'],['reviewers','Reviewer explorer'],['types','Review types'],['cycles','Cycles'],['boards','Leaderboards'],['method','Methodology']];
  var bar = h('div',{class:'tabbar'});
  tabs.forEach(function(t){
    bar.appendChild(h('button',{'data-tab':t[0],onClick:function(){show(t[0]);}},t[1]));
  });
  app.appendChild(bar);

  app.appendChild(sectionExpect());
  app.appendChild(sectionReviewers());
  app.appendChild(sectionTypes());
  app.appendChild(sectionCycles());
  app.appendChild(sectionBoards());
  app.appendChild(sectionMethod());

  app.appendChild(drawerEl());
  show('expect');
}

function show(id){
  var secs = app.querySelectorAll('section');
  for (var i=0;i<secs.length;i++) secs[i].className = secs[i].getAttribute('data-sec')===id?'active':'';
  var btns = app.querySelectorAll('.tabbar button');
  for (var j=0;j<btns.length;j++) btns[j].className = btns[j].getAttribute('data-tab')===id?'active':'';
  window.scrollTo(0,0);
}

// --- expectation tool -----------------------------------------------------
function sectionExpect(){
  var s = h('section',{'data-sec':'expect'});
  s.appendChild(h('h2',null,'How long should this review take?'));
  s.appendChild(h('p',{class:'sub'},'Pick a review type and cycle to see the peer baseline across all reviewers, then the individual reviewers who handle that type. Cycle 1 is the initial review; 2 and 3+ are re-reviews after corrections.'));

  var types = D.reviewTypes.map(function(t){return t.reviewtype;});
  var typeSel = h('select',{id:'exp-type'}, types.map(function(t){return h('option',{value:t},t);}));
  var cycleSel = h('select',{id:'exp-cycle'},[
    h('option',{value:'all'},'All cycles'),
    h('option',{value:'1 (initial)'},'Cycle 1 (initial)'),
    h('option',{value:'2'},'Cycle 2'),
    h('option',{value:'3+'},'Cycle 3+')
  ]);
  var ctrl = h('div',{class:'panel'},[
    h('div',{class:'row'},[
      h('div',null,[h('label',null,'Review type'),typeSel]),
      h('div',null,[h('label',null,'Review cycle'),cycleSel])
    ]),
    h('div',{id:'exp-out',style:'margin-top:14px'})
  ]);
  s.appendChild(ctrl);
  typeSel.addEventListener('change',renderExpect);
  cycleSel.addEventListener('change',renderExpect);
  setTimeout(renderExpect,0);
  return s;
}

function renderExpect(){
  var type = document.getElementById('exp-type').value;
  var cyc = document.getElementById('exp-cycle').value;
  var out = document.getElementById('exp-out');
  out.innerHTML='';
  var t = D.reviewTypes.filter(function(x){return x.reviewtype===type;})[0];

  // baseline card row
  var base;
  if (cyc==='all'){ base={median_days:t.median_days,p75_days:t.p75_days,p90_days:t.p90_days,n_reviews:t.n_reviews,correction_rate:t.correction_rate,n_reviewers:t.n_reviewers}; }
  else { base = t.cycles.filter(function(c){return c.cycle_bucket===cyc;})[0] || {}; }

  var kv = h('div',{class:'cards'});
  [['Typical (median)',d1(base.median_days)+' d'],
   ['Usually within (p75)',d1(base.p75_days)+' d'],
   ['Slow case (p90)',d1(base.p90_days)+' d'],
   ['Corrections likelihood',pct(base.correction_rate)],
   ['Sample size',n(base.n_reviews)+' reviews']
  ].forEach(function(c){ kv.appendChild(h('div',{class:'card'},[h('div',{class:'v'},c[1]),h('div',{class:'l'},c[0])])); });
  out.appendChild(h('h3',null,esc(type)+(cyc==='all'?'':' . cycle '+cyc)+' . peer baseline'));
  out.appendChild(kv);

  // per-cycle mini table when "all"
  if (cyc==='all'){
    var ct = tableEl(['Cycle','Reviews','Reviewers','Median d','p75','p90','Corrections'],
      t.cycles.map(function(c){return [c.cycle_bucket,n(c.n_reviews),n(c.n_reviewers),d1(c.median_days),d1(c.p75_days),d1(c.p90_days),ratePill(c.correction_rate,40,65)];}),
      [false,true,true,true,true,true,true]);
    out.appendChild(h('h3',null,'By cycle'));
    out.appendChild(ct);
  }

  // reviewers who do this type
  var rows = [];
  D.reviewers.forEach(function(r){
    var bt = r.byType.filter(function(x){return x.reviewtype===type;})[0];
    if (bt && Number(bt.n_reviews)>0) rows.push({r:r,bt:bt});
  });
  rows.sort(function(a,b){return Number(b.bt.n_reviews)-Number(a.bt.n_reviews);});
  out.appendChild(h('h3',null,'Reviewers handling '+esc(type)+' (2023 onward, '+rows.length+')'));
  var maxMed = Math.max.apply(null, rows.map(function(x){return Number(x.bt.median_days)||0;}).concat([1]));
  var tbl = tableEl(
    ['Reviewer','Reviews','Median days','p75','p90','Corrections',''],
    rows.map(function(x){
      var med = Number(x.bt.median_days)||0;
      var barpx = Math.round((med/maxMed)*90);
      return [
        linkReviewer(x.r.reviewer),
        n(x.bt.n_reviews),
        d1(x.bt.median_days),
        d1(x.bt.p75_days),
        d1(x.bt.p90_days),
        ratePill(x.bt.correction_rate,40,65),
        h('span',{class:'barwrap'},h('span',{class:'bar',style:'width:'+barpx+'px'}))
      ];
    }),
    [false,true,true,true,true,true,false]);
  out.appendChild(tbl);
  out.appendChild(h('p',{class:'foot'},'Median is the reviewer assign to finish time in calendar days, excluding passes over 60 days. Bars compare median days across reviewers of this type. Click a reviewer for full detail.'));
}

// --- reviewer explorer ----------------------------------------------------
var revSort = {key:'n_reviews', dir:-1};
function sectionReviewers(){
  var s = h('section',{'data-sec':'reviewers'});
  s.appendChild(h('h2',null,'Reviewer explorer'));
  s.appendChild(h('p',{class:'sub'},'All '+D.reviewers.length+' reviewers active since 2023. Search by name or type, click a column to sort, click a row for per-type, per-cycle, and yearly detail.'));
  var search = h('input',{type:'search',id:'rev-search',placeholder:'Search reviewer or review type'});
  search.addEventListener('input',renderReviewerTable);
  s.appendChild(h('div',{class:'panel'},[
    h('div',{class:'row'},[h('div',null,[h('label',null,'Search'),search]),
      h('div',null,[h('label',null,'Download'),h('a',{class:'dl',href:'/reviewers/data/reviewers.csv',download:''},'reviewers.csv')])]),
    h('div',{id:'rev-table',class:'scroll',style:'margin-top:12px'})
  ]));
  setTimeout(renderReviewerTable,0);
  return s;
}

var REV_COLS = [
  ['reviewer','Reviewer',false],['primary_type','Primary type',false],
  ['n_reviews','Reviews',true],['median_days','Median d',true],['p75_days','p75',true],
  ['p90_days','p90',true],['stall_rate','Stall %',true],['correction_rate','Corr %',true],
  ['last_finish','Last active',false]
];
function renderReviewerTable(){
  var q = (document.getElementById('rev-search').value||'').toLowerCase();
  var box = document.getElementById('rev-table');
  var rows = D.reviewers.filter(function(r){
    if (!q) return true;
    return String(r.reviewer).toLowerCase().indexOf(q)>=0 || String(r.primary_type).toLowerCase().indexOf(q)>=0;
  });
  rows.sort(function(a,b){
    var k=revSort.key, av=a[k], bv=b[k];
    if (k==='reviewer'||k==='primary_type'||k==='last_finish'){ return String(av).localeCompare(String(bv))*revSort.dir; }
    return ((Number(av)||0)-(Number(bv)||0))*revSort.dir;
  });
  var thead = h('tr',null, REV_COLS.map(function(c){
    var arrow = revSort.key===c[0] ? (revSort.dir<0?' ▼':' ▲') : '';
    return h('th',{class:(c[2]?'num ':'')+'sortable',onClick:function(){ if(revSort.key===c[0])revSort.dir*=-1; else {revSort.key=c[0];revSort.dir=c[2]?-1:1;} renderReviewerTable(); }}, c[1]+arrow);
  }));
  var body = rows.map(function(r){
    var tr = h('tr',{class:'clickable',onClick:function(){openDrawer(r.reviewer);}},[
      h('td',null,r.reviewer),
      h('td',null,h('span',{class:'tag'},r.primary_type)),
      h('td',{class:'num'},n(r.n_reviews)),
      h('td',{class:'num'},d1(r.median_days)),
      h('td',{class:'num'},d1(r.p75_days)),
      h('td',{class:'num'},d1(r.p90_days)),
      h('td',{class:'num'},pct(r.stall_rate)),
      h('td',{class:'num'},pct(r.correction_rate)),
      h('td',null,r.last_finish)
    ]);
    return tr;
  });
  var tbl = h('table',null,[h('thead',null,thead),h('tbody',null,body)]);
  box.innerHTML=''; box.appendChild(tbl);
}

function linkReviewer(name){
  return h('a',{href:'#',onClick:function(e){e.preventDefault();openDrawer(name);}}, name);
}

// --- drawer (reviewer detail) ---------------------------------------------
function drawerEl(){
  var bg = h('div',{class:'drawer-bg',id:'drawer-bg',onClick:closeDrawer});
  var dr = h('div',{class:'drawer',id:'drawer'});
  document.body.appendChild(bg);
  document.body.appendChild(dr);
  return h('span');
}
function openDrawer(name){
  var r = D.reviewers.filter(function(x){return x.reviewer===name;})[0];
  if (!r) return;
  var dr = document.getElementById('drawer');
  dr.innerHTML='';
  dr.appendChild(h('button',{class:'x',onClick:closeDrawer,html:'&times;'}));
  dr.appendChild(h('h2',{style:'margin-top:0;border:none'},r.reviewer));
  var yrs = r.yearly.map(function(y){return Number(y.finish_year);});
  var span = yrs.length ? (Math.min.apply(null,yrs)+' to '+Math.max.apply(null,yrs)) : '-';
  dr.appendChild(h('p',{class:'sub'},'Primary type '+esc(r.primary_type)+' . team '+esc(r.primary_team)+' . active '+span+' . latest review '+esc(r.last_finish)));

  dr.appendChild(h('h3',null,'Headline numbers, 2023 onward'));
  var kv = h('div',{class:'kv'});
  [['Reviews (2023+)',n(r.n_reviews)],['Permits (2023+)',n(r.n_permits)],
   ['Median turnaround',d1(r.median_days)+' d'],['p90',d1(r.p90_days)+' d'],
   ['Corrections rate',pct(r.correction_rate)],['Stall rate',pct(r.stall_rate)]
  ].forEach(function(c){ kv.appendChild(h('div',{class:'card'},[h('div',{class:'v'},c[1]),h('div',{class:'l'},c[0])])); });
  dr.appendChild(kv);
  dr.appendChild(h('p',{class:'foot'},'Every number in the cards and type/cycle tables counts reviews finished on or after 2023-01-01. The yearly table below uses the full history, so its totals run larger.'));

  dr.appendChild(h('h3',null,'By review type'));
  dr.appendChild(tableEl(['Type','Reviews','Median d','p75','p90','Corr %'],
    r.byType.map(function(t){return [t.reviewtype,n(t.n_reviews),d1(t.median_days),d1(t.p75_days),d1(t.p90_days),pct(t.correction_rate)];}),
    [false,true,true,true,true,true]));

  dr.appendChild(h('h3',null,'By cycle'));
  dr.appendChild(tableEl(['Cycle','Reviews','Median d','p90'],
    r.byCycle.map(function(c){return [c.cycle_bucket,n(c.n_reviews),d1(c.median_days),d1(c.p90_days)];}),
    [false,true,true,true]));

  dr.appendChild(h('h3',null,'Reviews per year, full history ('+D.dataWindow.first.slice(0,4)+' onward)'));
  var yt = tableEl(['Year','Reviews','Median d'],
    r.yearly.map(function(y){return [yearLabel(y.finish_year),n(y.n_reviews),d1(y.median_days)];}),
    [false,true,true]);
  dr.appendChild(yt);
  var sp = spark(r.yearly.map(function(y){return {v:y.median_days==null?null:Number(y.median_days)};}),160,32);
  dr.appendChild(h('div',{style:'margin-top:8px'},[h('span',{class:'foot'},'Median days trend: '),sp]));

  document.getElementById('drawer-bg').style.display='block';
  dr.classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-bg').style.display='none';
}

  s.appendChild(h('p',{class:'foot'},h('a',{class:'dl',href:'/reviewers/data/reviewTypes.csv',download:''},'download reviewTypes.csv')));

    [false,true,true,true,true,true,true,true,true])));

function sectionCycles(){

// --- leaderboards ---------------------------------------------------------
function sectionBoards(){
  var s = h('section',{'data-sec':'boards'});
  s.appendChild(h('h2',null,'Leaderboards'));
  s.appendChild(h('p',{class:'sub'},'Recent window (2023 onward). Speed boards require at least '+D.minTurn+' timed passes; rate boards require at least '+D.minVol+' reviews, so small samples do not dominate.'));
  function board(title, rows, valCol, valFmt, note){
    var t = tableEl(['#','Reviewer','Primary type','Reviews',valCol],
      rows.map(function(r,i){return [String(i+1),linkReviewer(r.reviewer),r.primary_type,n(r.n_reviews),valFmt(r)];}),
      [true,false,false,true,true]);
    return h('div',{class:'panel'},[h('h3',{style:'margin-top:0'},title),t,note?h('p',{class:'foot'},note):null]);
  }
  s.appendChild(board('Highest volume', D.leaderboards.highestVolume,'Reviews',function(r){return n(r.n_reviews);}));
  s.appendChild(board('Fastest median turnaround', D.leaderboards.fastest,'Median d',function(r){return d1(r.median_days)+' d';}));
  s.appendChild(board('Slowest median turnaround', D.leaderboards.slowest,'Median d',function(r){return d1(r.median_days)+' d';},'Slower medians often reflect more complex review types, not just pace. Compare within a review type on the Review types tab.'));
  s.appendChild(board('Highest corrections rate', D.leaderboards.highestCorrection,'Corr %',function(r){return pct(r.correction_rate);},'A high corrections rate can mean strict review or harder submittals. It is the share of this reviewer passes that ended in Corrections Required.'));
  s.appendChild(board('Highest stall rate', D.leaderboards.mostStalls,'Stall %',function(r){return pct(r.stall_rate);},'Stall rate is the share of passes that ran longer than 60 days. These are excluded from the turnaround medians above.'));
  return s;
}

// --- methodology ----------------------------------------------------------
function sectionMethod(){
  var s = h('section',{'data-sec':'method'});
  s.appendChild(h('h2',null,'Methodology and limitations'));
  var ul = h('ul');
  [
    'Source: SDCI Plan Review dataset (tqk8-y2z5) on data.seattle.gov, one row per permit, review cycle, review type, and reviewer.',
    'Completed reviews only. Every row in this dataset has a finish date. There are no open or in-progress rows, so current per-reviewer workload cannot be derived from it. The most recent review finished '+D.dataWindow.last+'.',
    'No live assignment data exists in Seattle open data. Building permit status (in review, corrections required) is published live in the Building Permits dataset, but it does not name the assigned reviewer.',
    'Turnaround is the reviewer assign date to the reviewer finish date, in calendar days. About 6,600 deduplicated rows lack a reviewer assign date and are excluded from turnaround but still counted in volume and corrections rates.',
    'Noise rule. A single pass longer than 60 days is treated as stalled (the file sat waiting on corrections rather than being actively reviewed) and is excluded from the headline median, p75, and p90. The share of such passes is reported as the stall rate.',
    'Recent window. Expectation tables and the reviewer explorer use reviews that finished on or after 2023-01-01. Yearly trends and the data-quality counts use the full history back to 2018.',
    'Deduplication. About one fifth of raw rows are exact duplicates on the logical key (permit, cycle, type, reviewer, assign date, finish date) and are collapsed so a pass is counted once. Raw and deduplicated counts are in the data-quality table below.',
    'Medians and percentiles are order statistics and are robust to the long tail, which is why no winsorizing is applied beyond the 60-day stall exclusion.',
    'Corrections rate is the share of a group of reviews whose result was Corrections Required. Approval rate is the share whose result was Approved.'
  ].forEach(function(t){ ul.appendChild(h('li',null,t)); });
  s.appendChild(ul);

  s.appendChild(h('h3',null,'Data quality'));
  s.appendChild(tableEl(['Metric','Value'], D.quality.map(function(q){return [q.metric,q.value];}), [false,false]));
  s.appendChild(h('p',{class:'foot'},'CSV exports for every table are in dashboard/data/. Regenerate with: pnpm tsx analysis/reviewers.ts'));
  return s;
}

// --- table helper ---------------------------------------------------------
function tableEl(headers, rows, numCols){
  var thead = h('tr',null, headers.map(function(hd,i){return h('th',{class:numCols[i]?'num':''},hd);}));
  var body = rows.map(function(r){
    return h('tr',null, r.map(function(cell,i){
      var td = h('td',{class:numCols[i]?'num':''});
      if (cell && cell.nodeType) td.appendChild(cell);
      else td.appendChild(document.createTextNode(cell==null?'-':String(cell)));
      return td;
    }));
  });
  return h('table',null,[h('thead',null,thead),h('tbody',null,body)]);
}

render();
})();
